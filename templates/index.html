<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>School/College Teacher Finder</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f6; margin: 0; padding: 20px; text-align: center; }
        .container { max-width: 800px; margin: auto; background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        h2 { color: #2c3e50; }
        .search-box { margin-bottom: 20px; }
        input { padding: 12px; width: 60%; border: 1px solid #ddd; border-radius: 5px; font-size: 16px; }
        button { padding: 12px 25px; background-color: #27ae60; color: white; border: none; border-radius: 5px; cursor: pointer; font-size: 16px; }
        button:hover { background-color: #219150; }
        #loader { display: none; margin-top: 20px; color: #3498db; font-weight: bold; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; display: none; }
        th, td { border: 1px solid #ddd; padding: 12px; text-align: left; }
        th { background-color: #2c3e50; color: white; }
        tr:nth-child(even) { background-color: #f9f9f9; }
    </style>
</head>
<body>

<div class="container">
    <h2>EIIN দিয়ে শিক্ষক ও কর্মচারী খুঁজুন</h2>
    <p>সরাসরি সরকারি সার্ভার থেকে তথ্য খোঁজা হবে</p>

    <div class="search-box">
        <input type="text" id="eiinInput" placeholder="EIIN নম্বর দিন (উদা: 112432)">
        <button onclick="searchTeachers()">তথ্য খুঁজুন</button>
    </div>

    <div id="loader">অপেক্ষা করুন... ডাটা স্ক্র্যাপ করা হচ্ছে...</div>

    <table id="resultTable">
        <thead>
            <tr>
                <th>নাম</th>
                <th>পদবী</th>
                <th>ইনডেক্স/আইডি</th>
            </tr>
        </thead>
        <tbody id="tableBody">
            </tbody>
    </table>
</div>

<script>
    async function searchTeachers() {
        const eiin = document.getElementById('eiinInput').value;
        const loader = document.getElementById('loader');
        const table = document.getElementById('resultTable');
        const tableBody = document.getElementById('tableBody');

        if (!eiin) {
            alert("দয়া করে EIIN নম্বর দিন");
            return;
        }

        // Setup UI
        loader.style.display = "block";
        table.style.display = "none";
        tableBody.innerHTML = "";

        try {
            // Render-e host kora apnar API link ekhane hobe
            const response = await fetch('/search', {
                method: 'POST',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: 'eiin=' + eiin
            });

            const data = await response.json();

            loader.style.display = "none";

            if (data.error) {
                alert("Error: " + data.error);
            } else if (data.length === 0) {
                alert("কোনো তথ্য পাওয়া যায়নি।");
            } else {
                table.style.display = "table";
                data.forEach(teacher => {
                    const row = `<tr>
                        <td>${teacher.name}</td>
                        <td>${teacher.designation}</td>
                        <td>${teacher.index || 'N/A'}</td>
                    </tr>`;
                    tableBody.innerHTML += row;
                });
            }
        } catch (error) {
            loader.style.display = "none";
            alert("সার্ভারের সাথে কানেক্ট করা যাচ্ছে না।");
        }
    }
</script>

</body>
</html>
